# VarMonitor configuration
# Ruta configurable via env VARMON_CONFIG o set_config_path() en C++

# Puerto TCP base del servidor C++ (usado por C++ para escuchar y Python para conectar).
# VarMonitor intentara usar este puerto y, si esta ocupado, probara puertos consecutivos
# hasta un maximo de +10 (ej. 1900-1910).
tcp_port = 1900

# Puerto del monitor web (solo Python/FastAPI)
web_port = 8080

# Poll del monitor web (solo Python/Frontend): intervalo de actualizacion en ms
# poll_interval_min_ms: minimo permitido (ej. 5 = muy rapido, mas carga)
# poll_interval_ms: valor por defecto si el usuario no tiene preferencia guardada
poll_interval_min_ms = 5
poll_interval_ms = 200

# Host de la app C++ (solo Python, para conexion remota usar la IP del equipo)
host = localhost

# IP de esta maquina en la red (para mostrar URL de acceso remoto)
lan_ip = 192.168.4.3

# Opcional: escuchar solo en esta IP (ej. la de Red1). Vacío = escuchar en todas (0.0.0.0)
# bind_host = 192.168.4.3

# Opcional: contraseña para el WebSocket. Si se define, el cliente debe enviar ?password=... correcto
# Ejemplo (cambiar en producción): auth_password = lorenzo1
# auth_password = lorenzo1
