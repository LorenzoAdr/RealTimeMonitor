# VarMonitor configuration
# Ruta configurable via env VARMON_CONFIG o set_config_path() en C++

# Puerto TCP base del servidor C++ (usado por C++ para escuchar y Python para conectar).
# VarMonitor intentara usar este puerto y, si esta ocupado, probara puertos consecutivos
# hasta un maximo de +10 (ej. 1900-1910).
tcp_port = 1900

# Tamano del buffer circular de historial por variable en C++ (numero de muestras)
# Con sample_interval=100ms y capacity=100, se guardan 10s de datos
history_capacity = 100

# Puerto del monitor web (solo Python/FastAPI)
web_port = 8080

# Host de la app C++ (solo Python, para conexion remota usar la IP del equipo)
host = localhost

# IP de esta maquina en la red (para mostrar URL de acceso remoto)
lan_ip = 192.168.4.3
