# VarMonitor configuration (ubicación recomendada en el repo: data/varmon.conf)
# También: VARMON_CONFIG, ./varmon.conf en cwd, o <repo>/varmon.conf (legado)
# Rutas de datos opcionales (vacío = por defecto: desarrollo → web_monitor/…; ejecutable → INSTALL_DIR/data/…):
# data_root =
# recordings_dir =
# server_state_dir =
# O variable de entorno: VARMON_DATA_DIR=/ruta/al/directorio/data (contiene recordings/ y server_state/)
#
# Raíz del explorador de archivos / modo edición (recomendado absoluta en binario empaquetado «package»):
browser_root = /opt/workspace/monitor

# Máximo de filas en la tabla SHM v2 (C++ y Python). Tamaño segmento ≈
#   64 + shm_max_vars*176 + shm_max_vars*shm_ring_depth*16 bytes
# Si monitorizas más que este límite, solo las primeras shm_max_vars tienen fila; el resto muestran "--".
# Reinicia el proceso C++ tras cambiar shm_max_vars, shm_ring_depth o shm_default_export_mode
# o las claves shm_publish_* / shm_async_publish.
shm_ring_depth = 5

# Publicación SHM: modo incremental (1) = solo getters para vars marcadas con mark_dirty() o en refresco completo.
# Refresco completo cada N ciclos (min 1). Con N=1 se leen todas las variables cada ciclo (compatible con apps sin mark_dirty).
# Omitir escritura mmap si tipo+valor escalar igual al anterior (1). Desactivar con 0.
shm_publish_dirty_mode = 1
shm_publish_full_refresh_cycles = 1
shm_publish_skip_unchanged = 1
# Troceo de export SHM (solo filas export, no IMPORT): N=1 = todas cada ciclo. N>1 = ~1/N filas por ciclo (índice % N == fase).
# El monitor web envía el mismo N que Rel act vía UDS; sin UDS aplica este valor. Con grabación o alarmas el backend fuerza publicación completa.
# shm_publish_slice_count = 1
# Tope para count en UDS (debe coincidir con update_ratio_max del backend si se usa la UI).
# update_ratio_max = 512
# 1 = publicar SHM en hilo dedicado (menos jitter en el hilo que llama write_shm_snapshot); 0 = sincrono (defecto).
# Reiniciar el proceso C++ tras cambiar.
shm_async_publish = 1
# Profundidad del anillo por variable (2–4096). Solo la lee el binario C++.
shm_default_export_mode = 2
# Tras consumir un import SHM (modo 1): 0 = export snapshot, 2 = export anillo.
shm_max_vars = 40000

# Puerto del monitor web (solo Python/FastAPI)
web_port = 8080

# Grabación Parquet: requiere pyarrow (requirements.txt del web_monitor) y el paquete
# varmonitor_plugins instalado: pip install -e tool_plugins/python (desde web_monitor: ../tool_plugins/python).
# Sin ese paquete, análisis/carga .parquet y grabación Parquet no funcionan aunque pyarrow esté instalado.
parquet_recording_allowed = true
# parquet_recording_allowed = false
#
# Si además del .parquet canónico quieres .tsv espejo (interoperabilidad / legado):
# recordings_write_tsv = false

# 1 = cada carga de la página borra localStorage y sessionStorage del navegador para este origen (arranque limpio).
# Reiniciar el proceso web tras cambiar. También: VARMON_WEB_CLEAR_BROWSER_STORAGE=1
web_clear_browser_storage = true

# Ciclo del backend (ms). Cada ciclo puede enviar vars_update; Rel act en la UI = cada cuantos ciclos actualizar
# cycle_interval_ms = 100
# update_ratio_max = 512

# Buffer visual por defecto (segundos) para gráficos/historial si el navegador no tiene preferencia guardada (1–7200).
# visual_buffer_sec = 10

# IP de esta maquina en la red (para mostrar URL de acceso remoto)
lan_ip = 192.168.4.3

# Opcional: escuchar solo en esta IP (ej. la de Red1). Vacío = escuchar en todas (0.0.0.0)
# bind_host = 192.168.4.3
# Si activas bind_host con una IP de LAN, abre la UI en http://ESA_IP:web_port/ — no uses 127.0.0.1
# salvo que escuches en loopback: otro proceso puede usar 127.0.0.1:8080 y romper la carga de .mjs (MIME raro).

# Raíz del árbol para el modo Git (status, commit, push, pull, log; escaneo de repos anidados).
# Vacío = misma que la raíz del explorador de proyecto del monitor. Ruta relativa a este directorio de config.
git_workspace_root = /opt/workspace/monitor
# Máximo de entradas pedidas a `git log` en la UI (1–500; evita cargar historiales enormes).
# git_log_max_commits = 80

# Opcional: contraseña para el WebSocket. Si se define, el cliente debe enviar ?password=... correcto
# Ejemplo (cambiar en producción): auth_password = lorenzo1
# auth_password = lorenzo1
# Contraseña de ingeniería: editor de archivos y BD protocolos (vacío = sin esta capa). Si auth_password está activa, también se exige en esas rutas.
sensitive_modes_password = engineer1

# Consola «Terminal» en la UI (lista blanca en servidor; ejecución en /api/terminal/exec).
# Vacío = sin comandos por línea; aún puede habilitarse solo scripts .sh si terminal_scripts_dir existe.
terminal_allowed_commands = ls,pwd,cat,git,cd
# Directorio con scripts .sh permitidos (solo nombre; sin subrutas). Relativo a data root o absoluto.
# terminal_scripts_dir = terminal_scripts
terminal_timeout_sec = 30
terminal_max_output_bytes = 262144

# Grabación: python (hilo en Python) | sidecar_cpp (binario varmon_sidecar leyendo el mismo SHM; menos CPU Python)
recording_backend = sidecar_cpp
# Con sidecar activo: 0 = Python no parsea SHM (solo vacía sem principal; UI congelada en variables SHM). >0 = tope Hz de parseo para vars_update (p. ej. 30). El TSV lo escribe el sidecar (sem dedicado).
# shm_parse_hz_sidecar_recording = 30
# shm_sidecar_sem_drain_interval_sec = 0.2
# Ruta al ejecutable (opcional; también VARMON_SIDECAR_BIN o PATH)
# recording_sidecar_bin = /ruta/a/varmon_sidecar
# Trazas stderr del sidecar: 0 | 1 | 2 (verbose). Vacío = solo export en el proceso que lanza el backend. Prioridad sobre el entorno si se define.
# recording_sidecar_trace = 2
# Linux: CPUs para varmon_sidecar (grabación y alarmas), ej. "3" o "2,5" o "4-7". Vacío = sin cambio.
# sidecar_cpu_affinity = 3

web_port_scan_max = 10
# Parquet canónico; TSV solo si se activa en Gestión avanzada (UI) o se pone a true.
recordings_write_tsv = 0

# Índice regex C++ (modo edición): rutas relativas al proyecto, separadas por comas. Vacío = el botón «Indexar» no recorre nada hasta configurar.
# Ejemplo (este repo): fuentes C++ en demo_app, librería, sidecar y tests.
file_edit_cpp_index_roots = demo_app,libvarmonitor,varmon_sidecar,tests

# Depuración GDB (intérprete MI2, WebSocket /ws/gdb desde el editor de archivos). Reiniciar el backend web tras cambiar.
gdb_debug_enabled = true
# Ruta al ejecutable gdb si no está en PATH (opcional).
# gdb_path =
# Linux: si -target-attach falla con «ptrace: Operación no permitida», revise kernel.yama.ptrace_scope
# (p. ej. sudo sysctl kernel.yama.ptrace_scope=0 hasta reinicio; el panel GDB muestra un aviso si aplica).
